services:
  - type: web
    name: cowork-sales-tool
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_webapp.py
    envVars:
      - key: THEME_API_URL
        value: https://hisho-ohxe.onrender.com
      - key: THEME_API_TOKEN
        sync: false          # Render Dashboard の Environment > Secret Files で設定
      - key: COWORK_SFA_DB
        value: /data/cowork_sfa.db
      - key: PORT
        value: "8787"
    disk:
      name: sfa-data
      mountPath: /data
      sizeGB: 1
