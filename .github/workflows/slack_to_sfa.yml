name: Slack→SFA 活動履歴取込

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 【重要】このワークフローについて
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# cowork_sfa.db はローカルファイルのSQLiteです。
# GitHub Actions から直接ローカルDBを更新することはできません。
#
# このワークフローを本番運用する方法は2択:
#
# [A] ローカルcronで定期実行（推奨）
#     Mac/Linux: crontab -e で以下を追加
#       */30 * * * * cd /path/to/repo && python scripts/slack_to_sfa.py >> logs/slack_to_sfa.log 2>&1
#     Windows: タスクスケジューラ または WSL2 の cron
#
# [B] GitHub Actions + DB外部化（将来オプション）
#     DBをPlanetScale/Supabase/Railway等のホスト型DBに移行すれば
#     このワークフローがそのまま使えます。
#     その際は scripts/slack_to_sfa.py の connect() 部分を
#     psycopg2 等に差し替えてください。
#
# このワークフローは現状「手動実行で動作確認する」用途に使用できます。
# DBの変更があればGitにcommit&pushします（data/processed_slack_ts.txt のみ）。
# cowork_sfa.db はGitにコミットしない運用なら、GitHub Actions上では
# 新しい空DBが作られて動作確認のみ可能です。
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

on:
  schedule:
    - cron: '*/30 * * * *'  # 30分おき（UTC）
  workflow_dispatch:          # 手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        # anthropic のみ。Slack APIはurllib(stdlib)で直接呼ぶ
        run: pip install anthropic

      - name: Slack→SFA 活動履歴取込
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SFA_DB_PATH: cowork_sfa.db
        run: python scripts/slack_to_sfa.py

      - name: 処理済みtsファイルをコミット（変更があれば）
        # cowork_sfa.db はGit管理外のため、処理済みtsファイルのみコミット
        # 処理済みtsをGitで共有することで、複数マシンでの二重処理を防止できる
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add data/processed_slack_ts.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: Slack→SFA sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true
