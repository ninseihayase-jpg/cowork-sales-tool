name: 商談一覧 日次スプシ転記

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 09:00 JST (UTC 00:00)
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: pip install gspread google-auth

      - name: サービスアカウントJSON を復元
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: SFA DB → スプシ転記
        env:
          WEEKLY_SHEET_ID: ${{ secrets.WEEKLY_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: service_account.json
          SFA_DB_PATH: cowork_sfa.db
        run: python scripts/export_deals_to_sheets.py
