<style>

.who{font-size:11px;color:#999;margin-bottom:2px}

.react .bub{background:#eef6ef;border:1px solid #cfe6d2;font-size:13px}
.react.bad .bub{background:#fdeeee;border-color:#f0cccc}

<h1>展示会トーク ロープレ・クイズ（会話形式）</h1>
<div class="sub">お客様がフワッと話しかけてきます。あなたの“返すセリフ”を選ぶと会話が進みます。相手の会社・困りごと・決裁権は会話で引き出してください。専門知識は不要。7ターン全部うまく返せたら「その場でアポ獲得」。解説は会話のあとにまとめて出ます。</div>
<div class="bar">
 <label>お客様 <select id="sel"></select></label>
 <button class="ghost" id="prev2">◀ 前</button>
 <button class="primary" id="next2">次のお客様 ▶</button>
 <button class="ghost" id="rand">🎲 ランダム</button>
 <span class="score" id="score">アポ獲得 0/40人</span>
</div>
<div class="lead">お客様 #<span id="curno"></span>　— 相手のことは会話で引き出そう</div>
<div id="view"></div>
<div class="nav"><button class="ghost" id="reset">この会話をやり直す</button></div>
<div class="small">※満点（7ターン正解＝アポ獲得）のお客様が40人そろえば、どんな相手でも自分の口でアポまで運べる到達目安です。</div>
