let current={personaIdx:null,turn:0,responses:[],html:''};
let history={tested:new Set(),apo:0};

function loadHistory(){
  try{
    const saved=JSON.parse(localStorage.getItem('rolepray-history')||'{}');
    history.tested=new Set(saved.tested||[]);
    history.apo=saved.apo||0;
  }catch(e){}
}

function saveHistory(){
  try{
    localStorage.setItem('rolepray-history',JSON.stringify({tested:Array.from(history.tested),apo:history.apo}));
  }catch(e){}
}

function resetScore(){
  if(confirm('スコアをリセットしますか？')){
    history.tested=new Set();
    history.apo=0;
    localStorage.removeItem('rolepray-history');
    updateScore();
    alert('スコアがリセットされました');
  }
}

function updateScore(){
  const tested=history.tested.size;
  const pct=Math.round(tested/40*100);
  document.getElementById('testedCount').textContent=tested;
  document.getElementById('testedPercent').textContent=pct+'%';
  document.getElementById('apoCount').textContent=history.apo;
  document.getElementById('apoPercent').textContent=tested>0?Math.round(history.apo/tested*100)+'%':'-';
}

function init(){
  current.personaIdx=Math.floor(Math.random()*DATA.length);
  current.turn=0;
  current.responses=[];
  current.html='';
  showNextTurn();
}

function showNextTurn(){
  if(current.turn===7){
    showRecap();
    return;
  }
  
  const p=DATA[current.personaIdx];
  const q=p.questions[current.turn];
  
  document.getElementById('turnDisplay').textContent=`ターン ${current.turn+1}/7`;
  
  let html=`<div class="turn-box">
    <div class="turn-header">ターン ${current.turn+1}</div>
    <div class="customer-line">${q.pre||'（相手の返答を待って...）'}</div>
    <div class="options">`;
  
  q.options.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectOption(${i})">${opt}</button>`;
  });
  
  html+=`</div></div>`;
  
  current.html+=html;
  document.getElementById('quizArea').innerHTML=current.html;
  
  setTimeout(()=>window.scrollTo(0,document.body.scrollHeight),100);
}

function selectOption(idx){
  const p=DATA[current.personaIdx];
  const q=p.questions[current.turn];
  current.responses[current.turn]=idx;
  const isCorrect=idx===q.correct;
  
  let reactionHtml=`<div class="reaction ${isCorrect?'':'incorrect'}">
    ${isCorrect?q.reactC:q.reactW}
  </div>`;
  
  current.html+=reactionHtml;
  document.getElementById('quizArea').innerHTML=current.html;
  
  current.turn++;
  setTimeout(()=>{
    window.scrollTo(0,document.body.scrollHeight);
    showNextTurn();
  },800);
}

function showRecap(){
  const p=DATA[current.personaIdx];
  history.tested.add(p.no);
  
  const qas=p.questions.map((q,i)=>({turn:i+1,correct:q.options[q.correct],user:q.options[current.responses[i]]}));
  const t7Correct=current.responses[6]===p.questions[6].correct;
  if(t7Correct) history.apo++;
  
  saveHistory();
  updateScore();
  
  let recapHtml=`<div class="recap-section" id="recapStart">
    <div class="recap-title">📊 このペルソナの結果</div>
    <div class="recap-item"><strong>${p.company}</strong></div>
    <div class="recap-item">${p.name}（${p.title}）</div>
    <div class="recap-item" style="margin-top:10px;color:#e65100"><strong>${t7Correct?'✅ アポ獲得！':'❌ 失注'}</strong></div>
  </div>
  
  <div class="persona-section">
    <h3>ペルソナ詳細</h3>
    <div class="persona-grid">
      <div class="persona-item"><strong>企業</strong>${p.company}</div>
      <div class="persona-item"><strong>業界</strong>${p.ind}</div>
      <div class="persona-item"><strong>KPI</strong>${p.kpi}</div>
      <div class="persona-item"><strong>課題</strong>${p.theme}</div>
    </div>
    
    <div class="qa-review">
      <h4 style="font-size:clamp(13px,3vw,14px);color:#1a237e;margin-bottom:10px">全ターン確認</h4>`;
  
  qas.forEach(qa=>{
    const correct=qa.correct===qa.user;
    recapHtml+=`<div class="qa-item">
      <div class="qa-turn">T${qa.turn} ${correct?'✓':'✗'}</div>
      <div class="qa-line"><strong>あなた：</strong>${qa.user}</div>`;
    if(!correct){
      recapHtml+=`<div class="qa-line"><strong>正答：</strong>${qa.correct}</div>`;
    }
    recapHtml+=`</div>`;
  });
  
  recapHtml+=`</div></div>
  <div class="button-group">
    <button class="restart-btn" onclick="init()">別のペルソナを試す</button>
  </div>
  <div class="stats-text">テスト済み: ${history.tested.size}/40 | アポ獲得: ${history.apo}件</div>`;
  
  current.html+=recapHtml;
  document.getElementById('quizArea').innerHTML=current.html;
  
  setTimeout(()=>{
    const recapElem=document.getElementById('recapStart');
    if(recapElem) recapElem.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

loadHistory();
updateScore();
init();
</script>
</body>
</html>
