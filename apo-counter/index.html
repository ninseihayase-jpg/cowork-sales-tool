<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #1d4ed8;
      --blue-light: #3b82f6;
      --blue-dark:  #1e3a8a;
      --orange:     #ea580c;
      --orange-lt:  #f97316;
      --gold:       #f59e0b;
      --green:      #059669;
      --gray:       #6b7280;
      --gray-lt:    #e5e7eb;
      --bg:         #f1f5f9;
      --card:       #ffffff;
      --text:       #1e293b;
      --muted:      #64748b;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans','メイリオ',Meiryo,'Yu Gothic UI','Segoe UI',sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      background: linear-gradient(155deg, var(--blue-dark) 0%, #2563eb 100%);
      color: #fff;
      padding: 14px 18px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(30,58,138,.45);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .app-title { font-size: 12px; font-weight: 700; line-height: 1.5; opacity: .85; }
    .grand-total { text-align: center; }
    .grand-number {
      font-size: 54px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -2px;
    }
    .grand-label { font-size: 11px; opacity: .7; }

    .day-tabs { display: flex; gap: 8px; justify-content: center; }
    .day-tab {
      background: rgba(255,255,255,.15);
      border: 2px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.8);
      padding: 6px 16px;
      border-radius: 24px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all .2s;
    }
    .day-tab.active  { background: #fff; border-color: #fff; color: var(--blue); }
    .day-tab:hover:not(.active) { background: rgba(255,255,255,.28); }

    /* ── MAIN ───────────────────────────────── */
    .main { padding: 14px 14px 90px; max-width: 1100px; margin: 0 auto; }

    .sec-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin: 14px 0 8px;
    }

    /* ── TEAM STRIP ─────────────────────────── */
    .team-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 4px;
    }
    .team-tile {
      background: var(--card);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-top: 3px solid var(--blue-light);
      text-align: center;
    }
    .team-tile.b   { border-top-color: var(--orange-lt); }
    .team-tile.h   { border-top-color: var(--gray); }
    .team-tile-name { font-size: 11px; color: var(--muted); font-weight: 700; }
    .team-tile-num  { font-size: 28px; font-weight: 900; color: var(--blue-light); line-height: 1.1; }
    .team-tile.b .team-tile-num { color: var(--orange-lt); }
    .team-tile.h .team-tile-num { color: var(--gray); }
    .team-tile-unit { font-size: 11px; color: var(--muted); }

    /* ── PEOPLE GRID ────────────────────────── */
    .people-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 680px) {
      .people-grid { grid-template-columns: repeat(2, 1fr); }
      .grand-number { font-size: 42px; }
    }
    @media (max-width: 360px) {
      .people-grid { grid-template-columns: 1fr; }
    }

    /* ── PERSON CARD ────────────────────────── */
    .pcard {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 13px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-left: 4px solid var(--blue-light);
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: box-shadow .2s;
    }
    .pcard:hover { box-shadow: 0 4px 14px rgba(0,0,0,.12); }
    .pcard.tb    { border-left-color: var(--orange-lt); }
    .pcard.th    { border-left-color: var(--gray); }

    .pcard-head  { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .pcard-emoji { font-size: 22px; line-height: 1.1; }
    .pcard-info  { flex: 1; min-width: 0; }
    .pcard-name  { font-size: 17px; font-weight: 800; }
    .pcard-role  { font-size: 10px; color: var(--muted); margin-top: 1px; line-height: 1.3; }

    .pcard-total { text-align: center; margin: 4px 0 2px; }
    .pcard-count {
      font-size: 50px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      display: inline-block;
    }
    .pcard-count.bump { animation: countBump .45s ease-out; }
    @keyframes countBump {
      0%  { transform: scale(1);    color: var(--text); }
      40% { transform: scale(1.4);  color: var(--gold); }
      100%{ transform: scale(1);    color: var(--text); }
    }
    .pcard-unit { font-size: 13px; font-weight: 700; color: var(--muted); }

    .day-row {
      display: flex;
      justify-content: space-between;
      background: var(--bg);
      border-radius: 8px;
      padding: 5px 2px;
      margin: 6px 0 10px;
    }
    .day-cell      { flex: 1; text-align: center; }
    .dcell-label   { font-size: 10px; color: var(--muted); }
    .dcell-val     { font-size: 16px; font-weight: 800; color: var(--text); }
    .day-cell.now .dcell-label { color: var(--blue); font-weight: 800; }
    .day-cell.now .dcell-val   { color: var(--blue); }
    .pcard.tb .day-cell.now .dcell-label { color: var(--orange); }
    .pcard.tb .day-cell.now .dcell-val   { color: var(--orange); }

    .add-btn {
      margin-top: auto;
      width: 100%;
      background: linear-gradient(135deg, var(--blue-light), var(--blue));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 0;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all .15s;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: .02em;
    }
    .pcard.tb .add-btn { background: linear-gradient(135deg, var(--orange-lt), var(--orange)); }
    .pcard.th .add-btn { background: linear-gradient(135deg, #94a3b8, var(--gray)); }
    .add-btn:hover  { opacity: .9; transform: scale(1.015); }
    .add-btn:active { transform: scale(.96); }
    .add-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    /* ── TOAST ──────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: #1e293b;
      color: #fff;
      padding: 13px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      max-width: 92vw;
      width: 340px;
      text-align: center;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── FAB ────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 18px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--gray-lt);
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.14);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: transform .2s;
    }
    .fab:hover { transform: rotate(25deg); }

    /* ── SETTINGS OVERLAY ───────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(3px);
    }
    .overlay.open { display: flex; }
    .sbox {
      background: var(--card);
      border-radius: 18px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 48px rgba(0,0,0,.25);
    }
    .sbox-title { font-size: 17px; font-weight: 800; margin-bottom: 18px; }
    .field { margin-bottom: 15px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      border: 1.5px solid var(--gray-lt);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--blue-light); }
    .field-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .field-hint.ok { color: var(--green); }
    .field-hint.ng { color: #dc2626; }

    .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
    .btn { padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: all .15s; }
    .btn-ghost   { background: none; border: 1.5px solid var(--gray-lt); color: var(--text); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-test    { background: var(--bg); color: var(--text); border: 1.5px solid var(--gray-lt); }
    .btn-test:hover { background: #e2e8f0; }

    .danger-zone  { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--gray-lt); }
    .danger-title { font-size: 11px; color: #dc2626; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .08em; }
    .btn-danger   { background: #fef2f2; color: #dc2626; border: 1.5px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
  </style>
</head>

// ============================================================
// STATE
// ============================================================
const KEY = 'inproc-apo-v1';

function blank() {
  const c={}, d={1:{},2:{},3:{}}, u={};
  PEOPLE.forEach(p => {
    c[p.id]=0; d[1][p.id]=0; d[2][p.id]=0; d[3][p.id]=0; u[p.id]=[];
  });
  return { c, d, u, webhook:'', day:1 };
}

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return blank();
    const s = JSON.parse(raw);
    const b = blank();
    return {
      ...b, ...s,
      c: {...b.c, ...s.c},
      d: {
        1: {...b.d[1], ...(s.d||{})[1]},
        2: {...b.d[2], ...(s.d||{})[2]},
        3: {...b.d[3], ...(s.d||{})[3]},
      },
      u: {...b.u, ...s.u},
    };
  } catch(e) { return blank(); }
}

function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }

// ============================================================
// MESSAGES
// ============================================================
function pickMsg(id, s) {
  const pool = MSG[id];
  if (!pool) return null;
  const used = s.u[id] || [];
  let avail = pool.map((_,i)=>i).filter(i=>!used.includes(i));
  if (!avail.length) { s.u[id]=[]; avail = pool.map((_,i)=>i); }
  const idx = avail[Math.floor(Math.random()*avail.length)];
  s.u[id] = [...(s.u[id]||[]), idx];
  return pool[idx];
}

// ============================================================
// SLACK
// ============================================================
async function pushSlack(url, text) {
  if (!url) return;
  try {
    await fetch(url, {
      method:'POST', mode:'no-cors',
      body: new URLSearchParams({ payload: JSON.stringify({ text }) }),
    });
  } catch(e) { console.warn('slack:', e); }
}

// ============================================================
// INCREMENT
// ============================================================
const cooldown = {};

function increment(id) {
  if (cooldown[id]) return;
  cooldown[id] = true;
  setTimeout(()=>delete cooldown[id], 700);

  const s = load();
  s.c[id]++;
  s.d[s.day][id]++;

  const person = PEOPLE.find(p=>p.id===id);
  let slackText = null;
  if (person.slack && MSG[id]) {
    const praise = pickMsg(id, s);
    slackText = `🎉 *${person.name}さん アポ獲得！*（通算 ${s.c[id]} 本）\n${praise}`;
  }

  save(s);
  render();
  bump(id);

  if (slackText && s.webhook) {
    pushSlack(s.webhook, slackText)
      .then(()=>toast('📨 Slackに送信しました！'));
  }
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const s = load();
  renderHeader(s);
  renderTeams(s);
  renderGrid(s);
  renderTabs(s);
}

function renderHeader(s) {
  let t=0; PEOPLE.forEach(p=>t+=s.c[p.id]);
  document.getElementById('grandTotal').textContent = t;
}

function renderTeams(s) {
  const ta = PEOPLE.filter(p=>p.team==='A').reduce((a,p)=>a+s.c[p.id],0);
  const tb = PEOPLE.filter(p=>p.team==='B').reduce((a,p)=>a+s.c[p.id],0);
  const th = s.c['haken']||0;
  document.getElementById('teamA').textContent=ta;
  document.getElementById('teamB').textContent=tb;
  document.getElementById('teamH').textContent=th;
}

function renderTabs(s) {
  [1,2,3].forEach(d=>{
    document.getElementById(`tab${d}`).classList.toggle('active',d===s.day);
  });
}

function renderGrid(s) {
  const g = document.getElementById('grid');
  const cur = s.day;
  g.innerHTML = PEOPLE.map(p=>{
    const tot = s.c[p.id];
    const d1 = s.d[1][p.id]||0, d2 = s.d[2][p.id]||0, d3 = s.d[3][p.id]||0;
    const tc = p.team==='B' ? 'tb' : p.team==='H' ? 'th' : '';
    return `
<div class="pcard ${tc}" id="card-${p.id}">
  <div class="pcard-head">
    <div class="pcard-emoji">${p.emoji}</div>
    <div class="pcard-info">
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-role">${p.role}</div>
    </div>
  </div>
  <div class="pcard-total">
    <span class="pcard-count" id="cnt-${p.id}">${tot}</span><span class="pcard-unit">本</span>
  </div>
  <div class="day-row">
    <div class="day-cell${cur===1?' now':''}"><div class="dcell-label">Day1</div><div class="dcell-val">${d1}</div></div>
    <div class="day-cell${cur===2?' now':''}"><div class="dcell-label">Day2</div><div class="dcell-val">${d2}</div></div>
    <div class="day-cell${cur===3?' now':''}"><div class="dcell-label">Day3</div><div class="dcell-val">${d3}</div></div>
  </div>
  <button class="add-btn" onclick="increment('${p.id}')">＋ アポ獲得！</button>
</div>`;
  }).join('');
}

function bump(id) {
  const el = document.getElementById(`cnt-${id}`);
  if (!el) return;
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
}

// ============================================================
// DAY
// ============================================================
function setDay(d) {
  const s=load(); s.day=d; save(s); render();
}

// ============================================================
// TOAST
// ============================================================
let toastTmr=null;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(toastTmr) clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('show'),3200);
}

// ============================================================
// SETTINGS
// ============================================================
function openSettings() {
  const s=load();
  document.getElementById('slackInput').value=s.webhook||'';
  updateHint(s.webhook);
  document.getElementById('overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('overlay').classList.remove('open');
}
function bgClick(e) {
  if(e.target===document.getElementById('overlay')) closeSettings();
}
function updateHint(url) {
  const el=document.getElementById('slackHint');
  if(!url){ el.textContent='URLを入力して保存してください'; el.className='field-hint'; }
  else { el.textContent=`✓ 設定済み`; el.className='field-hint ok'; }
}
function saveSettings() {
  const url=document.getElementById('slackInput').value.trim();
  const s=load(); s.webhook=url; save(s);
  updateHint(url);
  toast('✅ 設定を保存しました');
  closeSettings();
}
async function testSlack() {
  const url=document.getElementById('slackInput').value.trim();
  if(!url){ toast('⚠ Webhook URLを入力してください'); return; }
  toast('📨 テストメッセージを送信中...');
  await pushSlack(url,'🎉 *アポカウンター 接続テスト*\nSlack連携が正常に動作しています！ものづくりワールド2026、全員で頑張りましょう！');
  setTimeout(()=>toast('✅ テスト送信完了！Slackをご確認ください'),1000);
}
function resetAll() {
  if(!confirm('すべてのデータをリセットします。本当によろしいですか？')) return;
  localStorage.removeItem(KEY);
  closeSettings();
  render();
  toast('🔄 データをリセットしました');
}

// ============================================================
// INIT
// ============================================================
render();
</script>
